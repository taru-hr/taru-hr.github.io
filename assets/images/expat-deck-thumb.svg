<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" role="img" aria-label="Expat Employee Guide — interactive slide deck preview">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161616"/>
      <stop offset="1" stop-color="#101012"/>
    </linearGradient>
    <linearGradient id="goldbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFD65C"/>
      <stop offset="1" stop-color="#E5AF52"/>
    </linearGradient>
  </defs>

  <!-- slide background -->
  <rect width="600" height="450" fill="url(#sky)"/>

  <!-- faint Helsinki skyline silhouette along the bottom -->
  <g fill="#1e1e21" opacity="0.9">
    <rect x="0" y="300" width="600" height="150"/>
  </g>
  <g fill="#26262a">
    <rect x="40" y="286" width="26" height="40"/>
    <rect x="72" y="274" width="18" height="52"/>
    <rect x="150" y="280" width="30" height="46"/>
    <rect x="196" y="292" width="20" height="34"/>
    <rect x="392" y="284" width="22" height="42"/>
    <rect x="420" y="272" width="16" height="54"/>
    <rect x="470" y="290" width="28" height="36"/>
    <rect x="520" y="280" width="20" height="46"/>
    <!-- cathedral dome -->
    <rect x="240" y="256" width="70" height="70"/>
    <path d="M241 258 q34 -40 68 0 Z"/>
    <rect x="272" y="230" width="6" height="18"/>
    <rect x="266" y="238" width="18" height="4"/>
  </g>

  <!-- brand kicker -->
  <rect x="42" y="44" width="12" height="12" rx="3" fill="#FFD65C"/>
  <text x="62" y="55" font-family="'Segoe UI','Poppins',Arial,sans-serif" font-size="14" font-weight="600" letter-spacing="3" fill="#FFD65C">TARU HR · ONBOARDING</text>

  <!-- Finnish flag chip -->
  <g transform="translate(486,40)">
    <rect width="72" height="46" rx="6" fill="#F5F5F5"/>
    <rect x="20" y="0" width="14" height="46" fill="#2f6ea8"/>
    <rect x="0" y="16" width="72" height="14" fill="#2f6ea8"/>
  </g>

  <!-- title -->
  <text x="44" y="150" font-family="'Segoe UI','Poppins',Arial,sans-serif" font-size="52" font-weight="700" fill="#FCFCFC">Expat Employee</text>
  <text x="44" y="210" font-family="'Segoe UI','Poppins',Arial,sans-serif" font-size="52" font-weight="700" fill="#FFD65C">Guide</text>
  <text x="46" y="248" font-family="'Segoe UI','Poppins',Arial,sans-serif" font-size="19" font-weight="300" fill="#B9B9BD">A practical guide to relocating to Finland</text>

  <!-- "press to present" play badge -->
  <circle cx="516" cy="300" r="30" fill="#202022" stroke="#3a3a3d"/>
  <path d="M508 288 L508 312 L530 300 Z" fill="#FFD65C"/>

  <!-- presentation navigation bar -->
  <g transform="translate(0,398)">
    <!-- progress line -->
    <rect x="44" y="0" width="512" height="4" rx="2" fill="#2a2a2c"/>
    <rect x="44" y="0" width="150" height="4" rx="2" fill="url(#goldbar)"/>

    <!-- slide dots -->
    <circle cx="52" cy="30" r="5" fill="#FFD65C"/>
    <circle cx="72" cy="30" r="5" fill="#4a4a4d"/>
    <circle cx="92" cy="30" r="5" fill="#4a4a4d"/>
    <circle cx="112" cy="30" r="5" fill="#4a4a4d"/>
    <circle cx="132" cy="30" r="5" fill="#4a4a4d"/>

    <!-- counter -->
    <text x="556" y="35" text-anchor="end" font-family="'Segoe UI','Poppins',Arial,sans-serif" font-size="15" font-weight="500" fill="#A3A3A3">1 / 17</text>

    <!-- arrow-key hint -->
    <g transform="translate(300,20)">
      <rect x="0" y="0" width="24" height="20" rx="4" fill="#202022" stroke="#3a3a3d"/>
      <text x="12" y="15" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#CFCFCF">‹</text>
      <rect x="30" y="0" width="24" height="20" rx="4" fill="#202022" stroke="#3a3a3d"/>
      <text x="42" y="15" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#FFD65C">›</text>
    </g>
  </g>
</svg>
