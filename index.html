<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taru Parttimaa — HR Specialist</title>

  <!-- favicon -->
  <link rel="shortcut icon" href="./assets/images/logo.ico" type="image/x-icon">

  <!-- custom css -->
  <link rel="stylesheet" href="./assets/css/style.css">

  <!-- google fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <!--
    This page is a thin shell. Every section is a reusable component loaded from
    /components by assets/js/include.js, and the blog/portfolio cards are rendered
    from /data by assets/js/render.js. To add or change content, edit those files —
    see /templates for copy-paste starting points and /docs/ARCHITECTURE.md for how
    it all fits together.
  -->

  <main>

    <!-- #SIDEBAR -->
    <div data-include="components/sidebar.html"></div>

    <!-- #MAIN-CONTENT -->
    <div class="main-content">

      <!-- #NAVBAR -->
      <div data-include="components/navbar.html"></div>

      <!-- #PAGES -->
      <div data-include="components/about.html"></div>
      <div data-include="components/resume.html"></div>
      <div data-include="components/portfolio.html"></div>
      <div data-include="components/blog.html"></div>
      <div data-include="components/contact.html"></div>

    </div>

  </main>

  <!--
    Scripts. Load order matters:
      script.js  — defines initApp() (interactive behaviour)
      render.js  — defines renderCollections() (JSON -> cards)
      include.js — loads components, then calls the two functions above
  -->
  <script src="./assets/js/script.js"></script>
  <script src="./assets/js/render.js"></script>
  <script src="./assets/js/include.js"></script>

  <!-- ionicons -->
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

</body>

</html>
